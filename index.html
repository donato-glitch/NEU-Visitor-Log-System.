<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Visitor Log</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="auth-section" class="card">
            <h1 style="margin-top: 10px;">New Era University</h1>
            <p style="color: #666; font-weight: 500;">Library Visitor Log System</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <button id="login-btn" class="btn-google">
                Login with Google
            </button>
        </div>

        <div id="user-section" class="card main-card" style="display: none;">
            <h2 id="greeting">Welcome to NEU Library!</h2>

            <div id="admin-controls" style="display: none; margin: 20px 0; padding: 10px; background: #f0f4f8; border-radius: 8px;">
                <p style="margin-bottom: 10px; font-weight: bold; color: #555;">Select Role View:</p>
                <button onclick="toggleRole('user')" style="padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc;">User View</button>
                <button onclick="toggleRole('admin')" style="padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #0047ab; background: #0047ab; color: white;">Admin View</button>
            </div>
            
            <div id="visitor-form-container">
                <p>Please provide your details to record your visit:</p>
                <div class="form-group">
                    <select id="user-type">
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Staff">Staff</option>
                    </select>
                    <select id="college">
                        <option value="CICS">CICS (Informatics and Computing Studies)</option>
                        <option value="CAS">CAS (Arts and Sciences)</option>
                        <option value="COE">COE (Engineering)</option>
                        <option value="CBA">CBA (Business Administration)</option>
                        <option value="CON">CON (Nursing)</option>
                        <option value="NA">Not Applicable (Employee)</option>
                    </select>
                    <input type="text" id="reason" placeholder="Reason for visit (e.g. Study, Research)">
                    <button onclick="submitLog()" class="btn-submit">Submit & Log Visit</button>
                </div>
            </div>

            <div id="admin-view" style="display: none;">
                <hr style="margin: 20px 0;">
                <h3>Library Statistics Dashboard</h3>
                <div class="stats-grid">
                    <div class="stat-card blue">
                        <small>Today's Total</small>
                        <h2 id="today-count">0</h2>
                    </div>
                    <div class="stat-card green">
                        <small>Employees</small>
                        <h2 id="emp-count">0</h2>
                    </div>
                    <div class="stat-card orange">
                        <small>CICS Visitors</small>
                        <h2 id="cics-count">0</h2>
                    </div>
                </div>

                <div class="table-container">
                    <table id="logs-table">
                        <thead>
                            <tr><th>Name</th><th>College</th><th>Reason</th><th>Time</th></tr>
                        </thead>
                        <tbody id="logs-body"></tbody>
                    </table>
                </div>
            </div>

            <button onclick="logout()" class="btn-logout" style="margin-top: 30px;">Logout</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

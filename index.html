<div id="admin-view" class="metro-dashboard" style="display: none;">
    <div class="metro-header">
        <h1>NEU Library Visitor Log System</h1>
        <p>Logged in as: <span id="admin-email-label">eduardo.donato@neu.edu.ph</span></p>
    </div>

    <div class="tile-grid">
        <div class="tile tile-large bg-blue" onclick="toggleView('user')">
            <i class="fas fa-edit fa-5x"></i>
            <span>Open Kiosk Mode</span>
        </div>

        <div class="tile bg-teal" onclick="loadLogs()">
            <i class="fas fa-sync fa-3x"></i>
            <span>Refresh Logs</span>
        </div>

        <div class="tile bg-orange">
            <i class="fas fa-file-export fa-3x"></i>
            <span>Export Reports</span>
        </div>

        <div class="tile bg-red" onclick="logout()">
            <i class="fas fa-power-off fa-3x"></i>
            <span>Logout</span>
        </div>

        <div class="tile bg-purple">
            <i class="fas fa-user-plus fa-3x"></i>
            <span>Add New Admin</span>
        </div>

        <div class="tile bg-green">
            <i class="fas fa-cog fa-3x"></i>
            <span>System Settings</span>
        </div>
    </div>

    <div class="metro-table-card">
        <h3>Live Visitor Database</h3>
        </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Visitor Log System</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="container">
        <h2>NEU Visitor Log</h2>
        <form id="visitorForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="text" id="idNum" placeholder="Student/Visitor ID" required>
            <select id="purpose">
                <option value="Library">Library Use</option>
                <option value="Inquiry">General Inquiry</option>
                <option value="Meeting">Meeting</option>
            </select>
            <button type="submit">Record Visit</button>
        </form>

        <table id="logTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>ID</th>
                    <th>Purpose</th>
                    <th>Time In</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="script.js"></script> </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Visitor Log</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://neu.edu.ph/main/assets/images/neu_bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        h1 { color: #0047ab; margin-bottom: 5px; font-size: 24px; }
        p { color: #555; margin-bottom: 20px; }

        
        .btn-google {
            background: white;
            color: #444;
            padding: 10px 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: auto;
        }

        .btn-submit {
            background: #0047ab;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        
        .admin-controls {
            background: #eef2f7;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .admin-btn { padding: 5px 10px; cursor: pointer; font-size: 12px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-item { background: #0047ab; color: white; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3a/New_Era_University_logo.png/220px-New_Era_University_logo.png" width="80" alt="NEU Logo">
        
        <div id="auth-section">
            <h1>New Era University</h1>
            <p>Library Visitor Log System</p>
            <button id="login-btn" class="btn-google">
                <img src="https://www.google.com/favicon.ico" width="18"> Login with Google
            </button>
        </div>

        <div id="user-section" style="display: none;">
            <h2 id="greeting" style="color:#0047ab;">Welcome to NEU Library!</h2>

            <div id="admin-controls" class="admin-controls" style="display: none;">
                <button onclick="toggleRole('user')" class="admin-btn">User View</button>
                <button onclick="toggleRole('admin')" class="admin-btn" style="background:#0047ab; color:white; border:none;">Admin Stats</button>
            </div>

            <div id="visitor-form-container">
                <select id="user-type">
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher</option>
                </select>
                <select id="college">
                    <option value="CICS">CICS</option>
                    <option value="CAS">CAS</option>
                    <option value="COE">COE</option>
                </select>
                <input type="text" id="reason" placeholder="Reason for Visit">
                <button onclick="submitLog()" class="btn-submit">Submit Entry</button>
            </div>

            <div id="admin-view" style="display: none;">
                <h3>Today's Stats</h3>
                <div class="stats-grid">
                    <div class="stat-item">Total: <span id="today-count">0</span></div>
                    <div class="stat-item">CICS: <span id="cics-count">0</span></div>
                </div>
                <p style="font-size: 12px; margin-top: 10px;">Check Supabase for full table logs.</p>
            </div>

            <button onclick="logout()" style="margin-top:20px; color:gray; background:none; border:none; cursor:pointer;">Logout</button>
        </div>
    </div>
</div>

<script>
    
    const supabaseUrl = 'https://nkskdibhsqyxgirotoly.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rc2tkaWJoc3F5eGdpcm90b2x5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTYxNDQsImV4cCI6MjA4OTMzMjE0NH0.yq3jFykJN4EVgIJ1gTpf1ue2tq1zNz6keVCBcLxSAwc';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    
    const ADMIN_EMAILS = ['jcesperanza@neu.edu.ph', 'eduardo.donato@neu.edu.ph', 'donatojayr31@gmail.com'];

    
    document.getElementById('login-btn').addEventListener('click', async () => {
        await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.href }
        });
    });

    
    async function checkUser() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('user-section').style.display = 'block';
            
            if (ADMIN_EMAILS.includes(session.user.email.toLowerCase())) {
                document.getElementById('admin-controls').style.display = 'flex';
            }
        }
    }

    
    function toggleRole(role) {
        if (role === 'admin') {
            document.getElementById('visitor-form-container').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            updateStats();
        } else {
            document.getElementById('visitor-form-container').style.display = 'block';
            document.getElementById('admin-view').style.display = 'none';
        }
    }

    
    async function submitLog() {
        const { data: { session } } = await _supabase.auth.getSession();
        const reason = document.getElementById('reason').value;
        if(!reason) return alert("Fill reason");

        const { error } = await _supabase.from('attendance').insert([{
            full_name: session.user.user_metadata.full_name,
            email: session.user.email,
            user_type: document.getElementById('user-type').value,
            college: document.getElementById('college').value,
            reason: reason
        }]);

        if(!error) {
            alert("Success!");
            document.getElementById('reason').value = "";
        }
    }

    
    async function updateStats() {
        let { data } = await _supabase.from('attendance').select('*');
        if(data) {
            document.getElementById('today-count').innerText = data.length;
            document.getElementById('cics-count').innerText = data.filter(d => d.college === 'CICS').length;
        }
    }

    
    async function logout() {
        await _supabase.auth.signOut();
        window.location.reload();
    }

    checkUser();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Visitor Log</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="auth-section" class="card">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c2/New_Era_University_logo.png/250px-New_Era_University_logo.png" alt="NEU Logo" class="neu-logo">
            <h1>New Era University</h1>
            <p>Library Visitor Log System</p>
            <button id="login-btn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width:18px;">
                Login with Google
            </button>
        </div>

        <div id="user-section" class="card main-card" style="display: none;">
            <h2 id="greeting">Welcome to NEU Library!</h2>
            
            <div id="visitor-form-container">
                <p>Please provide your details to record your visit:</p>
                <div class="form-group">
                    <select id="user-type">
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Staff">Staff</option>
                    </select>
                    <select id="college">
                        <option value="CICS">CICS (Informatics and Computing Studies)</option>
                        <option value="CAS">CAS (Arts and Sciences)</option>
                        <option value="COE">COE (Engineering)</option>
                        <option value="CBA">CBA (Business Administration)</option>
                        <option value="CON">CON (Nursing)</option>
                        <option value="NA">Not Applicable (Employee)</option>
                    </select>
                    <input type="text" id="reason" placeholder="Reason for visit (e.g. Study, Research)">
                    <button onclick="submitLog()" class="btn-submit">Submit & Log Visit</button>
                </div>
            </div>

            <div id="admin-view" style="display: none;">
                <hr>
                <h3>Library Statistics Dashboard</h3>
                <div class="stats-grid">
                    <div class="stat-card blue">
                        <small>Today's Total</small>
                        <h2 id="today-count">0</h2>
                    </div>
                    <div class="stat-card green">
                        <small>Employees (Teacher/Staff)</small>
                        <h2 id="emp-count">0</h2>
                    </div>
                    <div class="stat-card orange">
                        <small>CICS Visitors</small>
                        <h2 id="cics-count">0</h2>
                    </div>
                </div>

                <div class="table-container">
                    <table id="logs-table">
                        <thead>
                            <tr><th>Name</th><th>College</th><th>Reason</th><th>Time</th></tr>
                        </thead>
                        <tbody id="logs-body"></tbody>
                    </table>
                </div>
            </div>

            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

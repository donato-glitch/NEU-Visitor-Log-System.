<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Visitor Log</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        
        <div id="auth-section">
            <h1>New Era University</h1>
            <p>Library Visitor Log System</p>
            <button id="login-btn" class="btn-google">
                <img src="https://www.google.com/favicon.ico" width="18"> Login with Google
            </button>
        </div>

        <div id="user-section" style="display: none;">
            <h2 id="greeting">Welcome to NEU Library!</h2>

            <div id="admin-controls" class="admin-controls" style="display: none;">
                <span class="label">ADMIN PANEL</span>
                <div class="role-btns">
                    <button id="user-view-btn" onclick="toggleRole('user')" class="active">User View</button>
                    <button id="admin-view-btn" onclick="toggleRole('admin')">Admin Stats</button>
                </div>
            </div>

            <div id="visitor-form-container">
                <select id="user-type">
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher</option>
                    <option value="Staff">Staff</option>
                </select>
                <select id="college">
                    <option value="CICS">CICS (Computing Studies)</option>
                    <option value="CAS">CAS (Arts and Sciences)</option>
                    <option value="COE">COE (Engineering)</option>
                    <option value="CBA">CBA (Business Admin)</option>
                </select>
                <input type="text" id="reason" placeholder="Reason for visit (e.g. Research)">
                <button onclick="submitLog()" class="btn-submit">Submit Visitor Log</button>
            </div>

            <div id="admin-view" style="display: none;">
                <div class="filters">
                    <select id="filter-college" onchange="updateStats()">
                        <option value="All">All Colleges</option>
                        <option value="CICS">CICS</option>
                        <option value="CAS">CAS</option>
                        <option value="COE">COE</option>
                    </select>
                    <select id="filter-type" onchange="updateStats()">
                        <option value="All">All Roles</option>
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Staff">Staff</option>
                    </select>
                </div>
                <div class="stats-grid">
                    <div class="stat-item"><small>Total Today</small><b id="total-stat">0</b></div>
                    <div class="stat-item"><small>Filtered Result</small><b id="filtered-stat">0</b></div>
                </div>
            </div>

            <button onclick="logout()" class="signout-btn">Sign Out Account</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

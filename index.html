<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Visitor Log</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="auth-section">
            <h2>NEU Library System</h2>
            <button id="login-btn" style="padding: 10px; cursor: pointer;">Login with Google</button>
        </div>

        <div id="user-section" style="display:none;">
            <h1 id="greeting"></h1>
            <p>Please fill out the visitor form.</p>
            </div>

        <div id="admin-section" style="display:none;">
            <h1 id="greeting-admin">Welcome, Admin!</h1>
            <div class="stats-grid" style="display: flex; gap: 10px;">
                <div class="card" style="background: #004a99; color: white; padding: 20px; border-radius: 8px; flex: 1;">
                    <h3>Daily Stats</h3>
                    <p>15 Visitors</p>
                </div>
                <div class="card" style="background: #004a99; color: white; padding: 20px; border-radius: 8px; flex: 1;">
                    <h3>Weekly Stats</h3>
                    <p>120 Visitors</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
